name: Build and deploy Docker image to Azure Web App - itstep-pv33-mk

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push container image
        run: |
          # Собираем образ. Мы используем секрет ACR_LOGIN_SERVER для тега
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/next-app:latest .
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/next-app:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_6431A3FE66D441B69C9652C192476AF0 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_C1BD9E10C52E4BB1A218F8281EA007DD }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_8E80F1E78D344EFD9332DBE640A448A5 }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'itstep-pv33-mk'
          images: '${{ secrets.ACR_LOGIN_SERVER }}/next-app:latest'

